<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none" role="img" aria-label="Batuli Prime Logo">
  <title>Batuli Prime</title>

  <!-- Background shield/emblem -->
  <path d="M18 8 L38 4 L58 8 L58 40 Q58 58 38 68 Q18 58 18 40 Z" fill="#0B1B3A" stroke="#C9921A" stroke-width="1.5"/>

  <!-- BP monogram inside shield -->
  <!-- B letter -->
  <path d="M26 20 L26 52 M26 20 L34 20 Q40 20 40 27 Q40 34 34 34 L26 34 M26 34 L35 34 Q42 34 42 43 Q42 52 35 52 L26 52"
        stroke="#C9921A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- P letter -->
  <path d="M44 52 L44 20 M44 20 L51 20 Q58 20 58 30 Q58 40 51 40 L44 40"
        stroke="#E8B84B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Gold crown dots above shield -->
  <circle cx="28" cy="2" r="1.5" fill="#C9921A"/>
  <circle cx="38" cy="0" r="2" fill="#E8B84B"/>
  <circle cx="48" cy="2" r="1.5" fill="#C9921A"/>

  <!-- Wordmark: BATULI -->
  <text x="72" y="38"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28"
        font-weight="700"
        letter-spacing="4"
        fill="#F4F6FB">BATULI</text>

  <!-- Wordmark: PRIME (gold) -->
  <text x="72" y="60"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="20"
        font-weight="400"
        font-style="italic"
        letter-spacing="8"
        fill="#C9921A">PRIME</text>

  <!-- Tagline underline rule -->
  <line x1="72" y1="65" x2="310" y2="65" stroke="#C9921A" stroke-width="0.8" opacity="0.5"/>

  <!-- Tagline text -->
  <text x="72" y="76"
        font-family="'Inter', Arial, sans-serif"
        font-size="7"
        font-weight="400"
        letter-spacing="3.5"
        fill="#C9921A"
        opacity="0.75">AI STORIES  ·  DIGITAL PRODUCTS  ·  TRAINING</text>

  <!-- Decorative gold star accent -->
  <path d="M305 36 L307 31 L309 36 L314 36 L310 39.5 L311.5 44.5 L307 41.5 L302.5 44.5 L304 39.5 L300 36 Z"
        fill="#C9921A" opacity="0.7"/>
</svg>
